name: Feature request
description: Suggest a new capability or an improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. worthline is domain-driven — skimming [CONTEXT.md](https://github.com/jenarvaezg/worthline/blob/main/CONTEXT.md) helps frame requests in the project's vocabulary.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Rough sketches are fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Mockups, links, or related issues/ADRs.
    validations:
      required: false
