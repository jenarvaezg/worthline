name: Vercel native build probe

on:
  push:
    branches: [probe/536-vercel-native-build]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_rBm14I3tzrhWQiNobR4yiw5u
  VERCEL_PROJECT_ID: prj_UK60yed13fPmHGpj095Pb0NyIII1

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - run: npm i -g vercel@latest
      - run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy preview with Vercel native builder
        run: vercel deploy --yes --token="${{ secrets.VERCEL_TOKEN }}"
