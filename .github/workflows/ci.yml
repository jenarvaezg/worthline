name: CI

# Corre en cada PR y también al mergear (push directo o merge) a main.
on:
  pull_request:
  push:
    branches: [main]

# Cancela ejecuciones anteriores en marcha sobre la misma ref (p. ej. al
# empujar otro commit a un PR); la de main no se cancela entre sí porque cada
# merge tiene su propio sha.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "26"

jobs:
  quality:
    name: Typecheck · Lint · Format · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Test glob integrity
        run: npm run test:globs

      - name: Unit tests with coverage (vitest)
        run: npm run test:coverage

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright serves the production build in CI (next start), so build the
      # web app first. The packages export TS source directly, so Next
      # transpiles them — no separate package build is needed.
      - name: Build web app
        run: npm run build --workspace @worthline/web

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Run first-run onboarding E2E (solo + hogar)
        run: npm run test:e2e:first-run

      - name: Run demo E2E
        run: npm run test:e2e:demo

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload first-run Playwright reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-first-run
          path: playwright-report-first-run-*/
          retention-days: 14

      - name: Upload demo Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-demo
          path: playwright-report-demo/
          retention-days: 14
