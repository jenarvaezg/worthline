name: CI

# Corre en cada PR y también al mergear (push directo o merge) a main.
on:
  pull_request:
  push:
    branches: [main]

# Cancela ejecuciones anteriores en marcha sobre la misma ref (p. ej. al
# empujar otro commit a un PR); la de main no se cancela entre sí porque cada
# merge tiene su propio sha.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "26"
  BUN_VERSION: "1.3.14"
  # Vercel Remote Cache — same token as deploy; team slug from `vercel teams ls`.
  TURBO_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  fast-checks:
    name: Fast checks (typecheck · lint · globs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Cache Biome
        uses: actions/cache@v5
        with:
          path: ~/.cache/biome
          key: biome-${{ runner.os }}-${{ hashFiles('bun.lock', 'biome.json') }}
          restore-keys: |
            biome-${{ runner.os }}-

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Biome (lint + format)
        run: bun run lint

      - name: Test glob integrity
        run: bun run test:globs

  unit-tests:
    name: Unit tests (coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Unit tests with coverage (vitest)
        run: bun run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  e2e-setup:
    name: E2E setup
    runs-on: ubuntu-latest
    env:
      # Auth.js boots in proxy.ts on every request; edge middleware inlines
      # AUTH_SECRET at build time, so it must be present for `next build` and
      # `next start`, not only in Playwright webServer env.
      AUTH_SECRET: worthline-e2e-ci-secret-not-for-production
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      # Playwright serves the production build in CI (next start), so build the
      # web app once here. Child jobs restore this artifact instead of rebuilding.
      # Run Next directly — a Turbo remote-cache hit can skip writing `.next` to
      # disk, which leaves the upload step with nothing to publish.
      - name: Build web app
        run: bun run --filter @worthline/web build

      - name: Upload web build
        uses: actions/upload-artifact@v7
        with:
          name: e2e-web-build
          path: apps/web/.next
          include-hidden-files: true
          retention-days: 1

  e2e-main:
    name: E2E (main suite)
    needs: e2e-setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Download web build
        uses: actions/download-artifact@v8
        with:
          name: e2e-web-build
          path: apps/web/.next

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  e2e-first-run:
    name: E2E (first-run)
    needs: e2e-setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Run first-run onboarding E2E (solo + hogar)
        run: bun run test:e2e:first-run

      - name: Upload first-run Playwright reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-first-run
          path: playwright-report-first-run-*/
          retention-days: 14

  e2e-demo:
    name: E2E (demo)
    needs: e2e-setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Download web build
        uses: actions/download-artifact@v8
        with:
          name: e2e-web-build
          path: apps/web/.next

      # Skip the redundant build in `test:e2e:demo` — setup already produced `.next`.
      - name: Run demo E2E
        run: bunx playwright test --config playwright.demo.config.ts

      - name: Upload demo Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-demo
          path: playwright-report-demo/
          retention-days: 14
