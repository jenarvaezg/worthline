name: CI

# Corre en cada PR y también al mergear (push directo o merge) a main.
on:
  pull_request:
  push:
    branches: [main]

# Cancela ejecuciones anteriores en marcha sobre la misma ref (p. ej. al
# empujar otro commit a un PR); la de main no se cancela entre sí porque cada
# merge tiene su propio sha.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "26"

jobs:
  quality:
    name: Typecheck · Lint · Format · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build

  rust:
    name: Rust core (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Toolchain for the worthline-core crate (PRD #280). The wasm32 target and
      # wasm-pack are installed here as prep for the WASM binding (#290); this
      # lane itself builds and tests the crate natively (incl. the #287 parity gate).
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Format check (rustfmt)
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit + parity tests (cargo test)
        run: cargo test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright serves the production build in CI (next start), so build the
      # web app first. The packages export TS source directly, so Next
      # transpiles them — no separate package build is needed.
      - name: Build web app
        run: npm run build --workspace @worthline/web

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
