name: CI

# Corre en cada PR y también al mergear (push directo o merge) a main.
on:
  pull_request:
  push:
    branches: [main]

# Cancela ejecuciones anteriores en marcha sobre la misma ref (p. ej. al
# empujar otro commit a un PR); la de main no se cancela entre sí porque cada
# merge tiene su propio sha.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "26"
  BUN_VERSION: "1.3.14"
  # Vercel Remote Cache — same token as deploy; team slug from `vercel teams ls`.
  TURBO_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  quality:
    name: Typecheck · Biome · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Biome (lint + format)
        run: bun run lint

      - name: Test glob integrity
        run: bun run test:globs

      - name: Unit tests with coverage (vitest)
        run: bun run test:coverage

      - name: Build
        run: bun run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      # Playwright serves the production build in CI (next start), so build the
      # web app first. The packages export TS source directly, so Next
      # transpiles them — no separate package build is needed.
      # Turbo task so this job can reuse @worthline/web#build from the quality job via
      # Vercel Remote Cache (same cache key as `turbo run build` in quality).
      - name: Build web app
        run: bunx turbo run build --filter=@worthline/web

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Run first-run onboarding E2E (solo + hogar)
        run: bun run test:e2e:first-run

      - name: Run demo E2E
        run: bun run test:e2e:demo

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload first-run Playwright reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-first-run
          path: playwright-report-first-run-*/
          retention-days: 14

      - name: Upload demo Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-demo
          path: playwright-report-demo/
          retention-days: 14
