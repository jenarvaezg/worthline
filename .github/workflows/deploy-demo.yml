name: Deploy demo (Vercel prebuilt, Node 24)

# Why this exists: Vercel's own build sandbox silently kills the Next 16
# production build on Node 22 and 24 (the only versions it offers); only Node 26
# is unaffected, and Vercel can't run 26. The app itself is healthy — it builds on
# Node 22/24/26 everywhere except Vercel's sandbox. So instead of letting Vercel
# build, we build the prebuilt output here on a clean Node 24 runner (matching the
# lambda's Node 24 ABI for the native better-sqlite3 binary) and ship it with
# `vercel deploy --prebuilt`, so Vercel never runs its broken builder.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-demo
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_rBm14I3tzrhWQiNobR4yiw5u
  VERCEL_PROJECT_ID: prj_UK60yed13fPmHGpj095Pb0NyIII1
  # Empty string when the secret is unset, so steps can gate on it.
  HAVE_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci

      # Token-free viability check. Confirms the production build works on Node 24
      # / x64 linux (what Vercel's sandbox chokes on). Runs only when we can't
      # deploy yet; once VERCEL_TOKEN is set, `vercel build` below covers it.
      - name: Verify production build on Node 24
        if: env.HAVE_TOKEN != 'true'
        env:
          DEMO: "1"
          WORTHLINE_DEMO_NOW: "2026-06-19"
        run: npm run build --workspace @worthline/web

      - name: Install Vercel CLI
        if: env.HAVE_TOKEN == 'true'
        run: npm i -g vercel@latest

      - name: Pull Vercel project config
        if: env.HAVE_TOKEN == 'true'
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      # Keep the demo gate env vars present on the project so the runtime lambda
      # reads them (DEMO mode + pinned clock). Idempotent: remove-then-add.
      - name: Ensure demo runtime env vars
        if: env.HAVE_TOKEN == 'true'
        run: |
          set -e
          ensure() {
            vercel env rm "$1" production -y --token="${{ secrets.VERCEL_TOKEN }}" >/dev/null 2>&1 || true
            printf '%s' "$2" | vercel env add "$1" production --token="${{ secrets.VERCEL_TOKEN }}"
          }
          ensure DEMO "1"
          ensure WORTHLINE_DEMO_NOW "2026-06-19"

      - name: Build prebuilt output on Node 24
        if: env.HAVE_TOKEN == 'true'
        env:
          DEMO: "1"
          WORTHLINE_DEMO_NOW: "2026-06-19"
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt output to Vercel
        if: env.HAVE_TOKEN == 'true'
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
