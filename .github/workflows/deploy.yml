name: Deploy (Vercel prebuilt, Node 24)

# Why prebuilt: historically Vercel's build sandbox could not complete the Next 16
# production build (it builds fine on Node 22/24/26 everywhere else), so we build
# the prebuilt output here on a clean Node 24 runner — matching the Vercel
# project's Node 24 lambda runtime — and ship it with `vercel deploy --prebuilt`.
# The original native-better-sqlite3 ABI reason is gone since the move to libSQL
# (PRD #381); whether the sandbox can now build natively (and this workflow can
# retire in favour of Vercel's Git integration) is tracked separately.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_rBm14I3tzrhWQiNobR4yiw5u
  VERCEL_PROJECT_ID: prj_UK60yed13fPmHGpj095Pb0NyIII1
  # Empty string when the secret is unset, so steps can gate on it.
  HAVE_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci

      # Token-free viability check. Confirms the production build works on Node 24
      # / x64 linux. Runs only when we can't deploy yet; once VERCEL_TOKEN is set,
      # `vercel build` below covers it.
      - name: Verify production build on Node 24
        if: env.HAVE_TOKEN != 'true'
        run: npm run build --workspace @worthline/web

      - name: Install Vercel CLI
        if: env.HAVE_TOKEN == 'true'
        run: npm i -g vercel@latest

      - name: Pull Vercel project config
        if: env.HAVE_TOKEN == 'true'
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build prebuilt output on Node 24
        if: env.HAVE_TOKEN == 'true'
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt output to Vercel
        if: env.HAVE_TOKEN == 'true'
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
