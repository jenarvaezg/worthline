name: Deploy (Vercel prebuilt, Node 24)

# Why prebuilt: Vercel's native build sandbox still cannot complete the Next 16
# production build. A real non-prebuilt preview deploy on 2026-06-25, after the
# libSQL/Turso migration removed better-sqlite3, reached "Compiled successfully"
# and then exited 1 immediately after "Skipping validation of types" with no
# actionable diagnostic. We therefore build the prebuilt output on a clean Node
# 24 runner and ship it with `vercel deploy --prebuilt`.
#
# Node 24 (not 26): Vercel's supported runtimes top out at 24.x today — see
# https://vercel.com/docs/functions/runtimes/node-js/node-js-versions
# CI and local dev stay on Node 26 via `.node-version`; `engines.node` is 24.x
# so `vercel build` picks a supported production runtime.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_rBm14I3tzrhWQiNobR4yiw5u
  VERCEL_PROJECT_ID: prj_UK60yed13fPmHGpj095Pb0NyIII1
  BUN_VERSION: "1.3.14"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  # Empty string when the secret is unset, so steps can gate on it.
  HAVE_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Token-free viability check. Confirms the production build works on Node 24
      # / x64 linux. Runs only when we can't deploy yet; once VERCEL_TOKEN is set,
      # `vercel build` below covers it.
      - name: Verify production build on Node 24
        if: env.HAVE_TOKEN != 'true'
        run: bunx turbo run build --filter=@worthline/web

      - name: Pull Vercel project config
        if: env.HAVE_TOKEN == 'true'
        run: bunx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      # Dashboard may still override install to `npm install --include=dev` from the
      # npm era; npm cannot resolve our `workspace:*` deps. Force Bun after pull.
      - name: Align Vercel install command with Bun
        if: env.HAVE_TOKEN == 'true'
        run: |
          if [ -f .vercel/project.json ]; then
            node --input-type=module -e "
              import { readFileSync, writeFileSync } from 'node:fs';
              const path = '.vercel/project.json';
              const project = JSON.parse(readFileSync(path, 'utf8'));
              project.settings ??= {};
              project.settings.installCommand = 'bun install --frozen-lockfile';
              writeFileSync(path, JSON.stringify(project, null, 2));
            "
          fi

      - name: Build prebuilt output on Node 24
        if: env.HAVE_TOKEN == 'true'
        run: bunx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt output to Vercel
        if: env.HAVE_TOKEN == 'true'
        run: bunx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
